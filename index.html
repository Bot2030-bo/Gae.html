<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ichancy👑 - سلوت الفواكه</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            font-family: 'Tahoma', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0f1a, #0f1a2b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: linear-gradient(145deg, #0d1422, #0a0f1a);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,215,0,0.25);
        }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 10px; }
        .header h1 { color: #ffd700; font-size: 28px; text-shadow: 0 0 8px rgba(255,215,0,0.4); }
        .header p { color: #ffd700; font-size: 11px; opacity: 0.7; }
        .card { background: rgba(0,0,0,0.5); border-radius: 32px; padding: 20px; margin-bottom: 15px; }
        input {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            background: #111a24;
            border: 1px solid #ffd70055;
            color: #ffd700;
            font-size: 16px;
            text-align: center;
            margin-bottom: 12px;
        }
        button {
            background: linear-gradient(145deg, #ffd700, #e6a800);
            border: none;
            padding: 14px;
            border-radius: 60px;
            width: 100%;
            font-weight: bold;
            font-size: 18px;
            color: #0a0f1a;
            cursor: pointer;
            margin-bottom: 8px;
        }
        button:active { transform: scale(0.97); }
        .btn-danger { background: linear-gradient(145deg, #ff4444, #cc0000); color: white; }
        .btn-success { background: linear-gradient(145deg, #00cc66, #009944); color: white; }
        .balance-card { background: rgba(0,0,0,0.6); border-radius: 32px; padding: 15px; text-align: center; margin-bottom: 20px; }
        .balance-amount { font-size: 42px; font-weight: bold; color: #ffd700; }
        .info-text { font-size: 11px; color: #aaa; margin-top: 15px; text-align: center; }
        .result-code { background: #0a0f1a; padding: 12px; border-radius: 20px; font-family: monospace; font-size: 18px; text-align: center; margin: 10px 0; color: #ffd700; }
        .flex-btns { display: flex; gap: 10px; }
        .flex-btns button { flex: 1; }
        .reels { display: flex; justify-content: center; gap: 12px; margin: 20px 0; }
        .reel { background: #03060a; width: 85px; height: 100px; display: flex; align-items: center; justify-content: center; border-radius: 24px; font-size: 52px; border: 1px solid rgba(255,215,0,0.3); }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- شاشة تسجيل الدخول وإنشاء حساب -->
    <div id="auth-screen">
        <div class="header"><h1>👑 ICHANCY 👑</h1><p>سجل دخولك أو أنشئ حساباً</p></div>
        <div class="card">
            <input type="text" id="login-username" placeholder="اسم المستخدم">
            <input type="password" id="login-password" placeholder="كلمة المرور">
            <button onclick="login()">🔓 دخول</button>
            <hr style="margin: 15px; border-color:#ffd70033;">
            <input type="text" id="register-username" placeholder="اسم مستخدم جديد">
            <input type="password" id="register-password" placeholder="كلمة مرور جديدة">
            <button onclick="register()">📝 إنشاء حساب جديد</button>
        </div>
        <div class="info-text">💡 أنشئ حساباً أولاً، ثم سجل دخولك لبدء اللعب</div>
    </div>

    <!-- شاشة اللعبة (تظهر بعد تسجيل الدخول) -->
    <div id="game-screen" style="display: none;">
        <div class="header"><h1>👑 ICHANCY SLOT 👑</h1><p>FRUIT MATCH</p></div>
        
        <div class="balance-card">
            <div class="balance-amount" id="balance">0</div>
            <div class="info-text">💰 رصيدك داخل اللعبة</div>
        </div>

        <div class="flex-btns">
            <button class="btn-success" onclick="transferToGame()">📥 شحن من البوت</button>
            <button class="btn-danger" onclick="transferToBot()">📤 سحب إلى البوت</button>
        </div>

        <div class="card">
            <div class="reels">
                <div class="reel" id="reel1">🍒</div>
                <div class="reel" id="reel2">🍋</div>
                <div class="reel" id="reel3">🍉</div>
            </div>
            
            <div class="flex-btns" style="margin: 15px 0;">
                <button onclick="setBet(1000)">💎 1000</button>
                <button onclick="setBet(1500)">💎 1500</button>
                <button onclick="setBet(25000)">🔥 25000</button>
            </div>
            
            <button onclick="spin()">🎡 ابدأ اللعب 🎡</button>
        </div>

        <div id="result-code" class="result-code">---</div>
        <div class="info-text" id="win-message">✨ اختر رهانك وابدأ ✨</div>
        <div class="info-text">
            ℹ️ بعد كل لعبة، انسخ النتيجة وأرسلها إلى البوت
        </div>
    </div>
</div>

<script>
    // --------------------- إعدادات اللعبة ---------------------
    const FRUITS = ['🍒', '🍋', '🍉', '🍇', '🍎', '🍊', '👑'];
    let currentUser = null;           // اسم المستخدم الحالي
    let gameBalance = 0;              // رصيد اللعبة للمستخدم الحالي
    let currentBet = 1000;            // الرهان الحالي
    let lastResult = null;            // آخر نتيجة (WINxxx أو LOSExxx)
    
    const BOT_USERNAME = "YourBotUsername";  // ⚠️ غيّر إلى يوزر بوتك

    // --------------------- دوال الحسابات (محلية) ---------------------
    function getAccounts() {
        const accounts = localStorage.getItem("ichancy_accounts");
        return accounts ? JSON.parse(accounts) : {};
    }

    function saveAccounts(accounts) {
        localStorage.setItem("ichancy_accounts", JSON.stringify(accounts));
    }

    function getUserData(username) {
        const data = localStorage.getItem(`ichancy_user_${username}`);
        return data ? JSON.parse(data) : { balance: 5000 };  // رصيد ابتدائي 5000
    }

    function saveUserData(username, data) {
        localStorage.setItem(`ichancy_user_${username}`, JSON.stringify(data));
    }

    // تسجيل حساب جديد
    function register() {
        const username = document.getElementById('register-username').value.trim();
        const password = document.getElementById('register-password').value.trim();
        
        if (!username || !password) {
            alert("❌ الرجاء إدخال اسم مستخدم وكلمة مرور");
            return;
        }
        
        const accounts = getAccounts();
        if (accounts[username]) {
            alert("❌ اسم المستخدم موجود بالفعل!");
            return;
        }
        
        accounts[username] = password;
        saveAccounts(accounts);
        
        // إنشاء بيانات المستخدم
        saveUserData(username, { balance: 5000 });
        
        alert("✅ تم إنشاء الحساب بنجاح! يمكنك الآن تسجيل الدخول.");
        document.getElementById('register-username').value = "";
        document.getElementById('register-password').value = "";
    }

    // تسجيل الدخول
    function login() {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value.trim();
        
        if (!username || !password) {
            alert("❌ الرجاء إدخال اسم المستخدم وكلمة المرور");
            return;
        }
        
        const accounts = getAccounts();
        if (accounts[username] !== password) {
            alert("❌ اسم المستخدم أو كلمة المرور غير صحيحة");
            return;
        }
        
        currentUser = username;
        const userData = getUserData(username);
        gameBalance = userData.balance;
        
        updateBalanceUI();
        
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        
        alert(`✅ مرحباً ${username}! رصيدك الحالي: ${gameBalance.toLocaleString()} ل.س`);
    }

    // تحديث عرض الرصيد
    function updateBalanceUI() {
        document.getElementById('balance').innerText = gameBalance.toLocaleString();
        // حفظ الرصيد تلقائياً
        if (currentUser) {
            const userData = getUserData(currentUser);
            userData.balance = gameBalance;
            saveUserData(currentUser, userData);
        }
    }

    // --------------------- دوال الشحن والسحب (ترسل أوامر للبوت) ---------------------
    function transferToGame() {
        // المستخدم يطلب من البوت شحن الرصيد إلى اللعبة
        const amount = prompt("💰 كم تريد شحن من البوت إلى اللعبة؟", "1000");
        if (!amount || isNaN(amount) || parseInt(amount) <= 0) {
            alert("❌ مبلغ غير صحيح");
            return;
        }
        const result = `TRANSFERTOGAME${amount}`;
        navigator.clipboard.writeText(result).then(() => {
            alert(`✅ انسخ الأمر التالي وأرسله إلى البوت:\n\n${result}\n\nسيتم تحويل ${amount} ل.س إلى رصيد اللعبة`);
        });
    }

    function transferToBot() {
        const amount = prompt("💰 كم تريد سحب من اللعبة إلى البوت؟", "1000");
        if (!amount || isNaN(amount) || parseInt(amount) <= 0) {
            alert("❌ مبلغ غير صحيح");
            return;
        }
        if (parseInt(amount) > gameBalance) {
            alert(`❌ رصيدك غير كافٍ! رصيدك: ${gameBalance.toLocaleString()} ل.س`);
            return;
        }
        const result = `TRANSFERTOBOT${amount}`;
        navigator.clipboard.writeText(result).then(() => {
            alert(`✅ انسخ الأمر التالي وأرسله إلى البوت:\n\n${result}\n\nسيتم سحب ${amount} ل.س من رصيد اللعبة`);
        });
    }

    // --------------------- دوال اللعبة ---------------------
    function setBet(amount) {
        currentBet = amount;
        document.getElementById('win-message').innerHTML = `💰 الرهان: ${amount.toLocaleString()} ل.س`;
    }

    function calculatePrize(bet, symbols) {
        const [s1, s2, s3] = symbols;
        const isTriple = (s1 === s2 && s2 === s3);
        const isPair = (s1 === s2 || s2 === s3 || s1 === s3);
        const crownCount = symbols.filter(s => s === '👑').length;
        
        let multiplier = 0;
        if (isTriple) {
            if (s1 === '👑') multiplier = 18;
            else if (s1 === '🍒') multiplier = 6;
            else if (s1 === '🍋') multiplier = 5;
            else if (s1 === '🍉') multiplier = 7;
            else if (s1 === '🍇') multiplier = 8;
            else if (s1 === '🍎') multiplier = 6;
            else if (s1 === '🍊') multiplier = 6;
            else multiplier = 4;
        } else if (isPair) {
            multiplier = 2;
        }
        
        let prize = bet * multiplier;
        prize += crownCount * 400;
        
        const MAX_WIN = 80000;
        if (prize > MAX_WIN) prize = MAX_WIN;
        
        return { prize, multiplier, isWin: prize > 0 };
    }

    function spin() {
        if (!currentUser) {
            alert("❌ الرجاء تسجيل الدخول أولاً");
            return;
        }
        if (gameBalance < currentBet) {
            alert(`❌ رصيدك غير كافٍ! تحتاج ${currentBet.toLocaleString()} ل.س`);
            return;
        }
        
        // خصم الرهان
        gameBalance -= currentBet;
        updateBalanceUI();
        
        // توليد رموز عشوائية
        const symbols = [
            FRUITS[Math.floor(Math.random() * FRUITS.length)],
            FRUITS[Math.floor(Math.random() * FRUITS.length)],
            FRUITS[Math.floor(Math.random() * FRUITS.length)]
        ];
        
        // تحديث واجهة السلوت
        document.getElementById('reel1').innerText = symbols[0];
        document.getElementById('reel2').innerText = symbols[1];
        document.getElementById('reel3').innerText = symbols[2];
        
        // حساب الربح
        const { prize, multiplier, isWin } = calculatePrize(currentBet, symbols);
        
        if (isWin && prize > 0) {
            gameBalance += prize;
            lastResult = `WIN${prize}`;
            document.getElementById('win-message').innerHTML = `🎉 فوز! +${prize.toLocaleString()} ل.س 🎉`;
            document.getElementById('win-message').style.color = "#ffd700";
        } else {
            lastResult = `LOSE${currentBet}`;
            document.getElementById('win-message').innerHTML = `😔 خسارة! -${currentBet.toLocaleString()} ل.س`;
            document.getElementById('win-message').style.color = "#ff8888";
        }
        
        document.getElementById('result-code').innerHTML = lastResult;
        updateBalanceUI();
    }
</script>
</body>
                                                           </html>
